<!DOCTYPE html>
<html>
<head>
<title>Trading Terminal</title>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { margin:0; background:#0b1220; color:white; font-family:Arial; }

.header {
background:#111827;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container {
display:grid;
grid-template-columns: 250px 1fr;
grid-template-rows: auto 200px;
height:calc(100vh - 50px);
gap:5px;
}

.watchlist {
background:#111827;
padding:10px;
overflow:auto;
}

.stock {
padding:8px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}
.stock:hover { background:#1f2937; }

.chart-panel {
background:#0f172a;
padding:10px;
}

.scanner {
grid-column:2/3;
background:#111827;
padding:10px;
overflow:auto;
}

button {
background:#00ffff;
border:none;
padding:5px 10px;
cursor:pointer;
margin-left:5px;
}
</style>
</head>

<body>

<div class="header">
<div>📊 Trading Terminal - {{ user }}</div>
<div>
<button onclick="toggleLevels()">PDH/PDL</button>
<button onclick="toggleRefresh()">Auto</button>
{% if role == "admin" %}
<a href="/admin" style="color:orange;">Admin</a>
{% endif %}
<a href="/logout" style="color:red;margin-left:10px;">Logout</a>
</div>
</div>

<div class="container">

<div class="watchlist">
<h3>Watchlist</h3>
{% for key,value in stocks.items() %}
<div class="stock" onclick="selectStock('{{ key }}')">
{{ value }}
</div>
{% endfor %}
</div>

<div class="chart-panel">
<div id="chart" style="width:100%;height:500px;"></div>
</div>

<div class="scanner">
<h3>📈 Scanner Alerts</h3>
<div id="alerts">Scanner Active</div>
</div>

</div>

<script>

let currentStock = "{{ first_stock }}";
let refreshEnabled = true;
let levelEnabled = true;

const chartContainer = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartContainer, {
    width: chartContainer.clientWidth,
    height: 500,
    layout: {
        background: { color: '#0f172a' },
        textColor: '#ffffff',
    },
    grid: {
        vertLines: { color: '#1e293b' },
        horzLines: { color: '#1e293b' },
    },
});

const candleSeries = chart.addSeries(
    LightweightCharts.CandlestickSeries
);

let pdhLine = null;
let pdlLine = null;

window.addEventListener('resize', () => {
    chart.applyOptions({ width: chartContainer.clientWidth });
});

function selectStock(stock){
    currentStock = stock;
    loadChart();
}

function flash(color){
    document.body.style.backgroundColor = color;
    setTimeout(()=>{
        document.body.style.backgroundColor="#0b1220";
    },300);
}

function loadChart(){

    fetch(`/chart-data?stock=${currentStock}`)
    .then(r=>r.json())
    .then(data=>{

        if(data.candles && data.candles.length){
            candleSeries.setData(data.candles);
        }

        if(levelEnabled && data.pdh && data.pdl){

            if(pdhLine) candleSeries.removePriceLine(pdhLine);
            if(pdlLine) candleSeries.removePriceLine(pdlLine);

            pdhLine = candleSeries.createPriceLine({
                price: data.pdh,
                color: 'red',
                lineWidth: 2,
                title: 'PDH'
            });

            pdlLine = candleSeries.createPriceLine({
                price: data.pdl,
                color: 'green',
                lineWidth: 2,
                title: 'PDL'
            });

            let last = data.candles[data.candles.length-1];

            if(last){
                if(last.close >= data.pdh) flash("#3b0000");
                if(last.close <= data.pdl) flash("#003b00");
            }
        }

    })
    .catch(err=>console.log(err));
}

function toggleRefresh(){
    refreshEnabled = !refreshEnabled;
}

function toggleLevels(){
    levelEnabled = !levelEnabled;
    loadChart();
}

loadChart();

setInterval(()=>{
    if(refreshEnabled){
        loadChart();
    }
},10000);

</script>

</body>
</html>
