<!DOCTYPE html>
<html>
<head>
<title>Login - Trading Terminal</title>
<style>
body {
margin:0;
background:linear-gradient(135deg,#0b1220,#111827);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#0ff;
}
.card {
background:#111827;
padding:40px;
border-radius:15px;
box-shadow:0 0 25px #00ffff55;
text-align:center;
width:320px;
}
input {
width:100%;
padding:12px;
margin:10px 0;
background:#0f172a;
border:1px solid #0ff;
color:#0ff;
border-radius:6px;
}
button {
width:100%;
padding:12px;
background:#00ffff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}
.error { color:red; margin-bottom:10px; }
</style>
</head>
<body>

<div class="card">
<h2>🔐 Pro Trading Login</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
