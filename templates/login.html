<!DOCTYPE html>
<html>
<head>
<title>ProTradeX Login</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111827;padding:30px;border-radius:10px}
input{display:block;margin:10px 0;padding:8px;width:200px}
button{padding:8px;width:100%;background:cyan;border:none}
</style>
</head>
<body>
<form method="POST" class="box">
<h2>ProTradeX Login</h2>
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button type="submit">Login</button>
</form>
</body>
</html>
